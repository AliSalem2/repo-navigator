<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>repo-navigator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }
  header { padding: 2rem; border-bottom: 1px solid #21262d; display: flex; align-items: center; gap: 12px; }
  header svg { width: 24px; height: 24px; color: #58a6ff; }
  header h1 { font-size: 18px; font-weight: 600; color: #e6edf3; }
  header span { font-size: 13px; color: #8b949e; }
  main { max-width: 860px; margin: 0 auto; padding: 2rem; }
  .form-row { display: flex; gap: 10px; margin-bottom: 12px; }
  input { flex: 1; background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 10px 14px; color: #e6edf3; font-size: 14px; outline: none; }
  input:focus { border-color: #58a6ff; }
  input::placeholder { color: #484f58; }
  .options { display: flex; align-items: center; gap: 8px; margin-bottom: 1.5rem; font-size: 13px; color: #8b949e; }
  .options input[type=checkbox] { accent-color: #58a6ff; width: 14px; height: 14px; }
  button { background: #238636; border: 1px solid #2ea043; border-radius: 6px; color: #fff; font-size: 14px; font-weight: 500; padding: 10px 20px; cursor: pointer; white-space: nowrap; }
  button:hover { background: #2ea043; }
  button:disabled { opacity: 0.5; cursor: default; }
  .status { font-size: 13px; color: #8b949e; margin-bottom: 1.5rem; min-height: 20px; }
  .status.error { color: #f85149; }
  .output { background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 2rem; display: none; }
  .output.visible { display: block; }
  .output h1 { font-size: 22px; font-weight: 600; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid #21262d; }
  .output h2 { font-size: 16px; font-weight: 600; margin: 1.5rem 0 0.5rem; color: #58a6ff; }
  .output h3 { font-size: 14px; font-weight: 600; margin: 1rem 0 0.4rem; color: #8b949e; }
  .output p { font-size: 14px; line-height: 1.7; color: #c9d1d9; margin-bottom: 0.75rem; }
  .output ul, .output ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
  .output li { font-size: 14px; line-height: 1.7; color: #c9d1d9; margin-bottom: 4px; }
  .output code { background: #0d1117; border: 1px solid #30363d; border-radius: 4px; padding: 1px 6px; font-family: 'SFMono-Regular', Consolas, monospace; font-size: 12px; color: #e6edf3; }
  .output pre { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 1rem; overflow-x: auto; margin-bottom: 1rem; }
  .output pre code { border: none; padding: 0; background: transparent; font-size: 13px; }
  .output strong { color: #e6edf3; font-weight: 600; }
  .output hr { border: none; border-top: 1px solid #21262d; margin: 1.5rem 0; }
  .meta { font-size: 12px; color: #484f58; margin-bottom: 1.5rem; }
</style>
</head>
<body>

<header>
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
  <h1>repo-navigator</h1>
  <span>understand any codebase without reading the docs</span>
</header>

<main>
  <div class="form-row">
    <input type="text" id="repo-input" placeholder="https://github.com/owner/repo" />
    <button id="run-btn" onclick="runAgent()">Analyse</button>
  </div>
  <div class="options">
    <input type="checkbox" id="compare-toggle" checked>
    <label for="compare-toggle">Include README vs reality comparison</label>
  </div>
  <div class="status" id="status"></div>
  <div class="output" id="output">
    <div class="meta" id="meta"></div>
    <div id="report"></div>
  </div>
</main>

<script>
const API = 'https://repo-navigator-724060547545.europe-west1.run.app';

async function runAgent() {
  const repoUrl = document.getElementById('repo-input').value.trim();
  const compare = document.getElementById('compare-toggle').checked;
  const btn = document.getElementById('run-btn');
  const status = document.getElementById('status');
  const output = document.getElementById('output');

  if (!repoUrl) { status.textContent = 'Please enter a GitHub repo URL.'; return; }

  btn.disabled = true;
  status.className = 'status';
  status.textContent = 'Running agent — this takes 1-2 minutes...';
  output.className = 'output';

  try {
    const res = await fetch(`${API}/analyse`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ repo_url: repoUrl, compare })
    });

    if (!res.ok) throw new Error(`API error ${res.status}`);
    const data = await res.json();

    document.getElementById('meta').textContent = data.repo;
    document.getElementById('report').innerHTML = marked.parse(data.report);
    output.className = 'output visible';
    status.textContent = '';
  } catch (e) {
    status.className = 'status error';
    status.textContent = `Error: ${e.message}`;
  } finally {
    btn.disabled = false;
  }
}

document.getElementById('repo-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') runAgent();
});
</script>
</body>
</html>
